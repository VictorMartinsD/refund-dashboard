<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Refund - Controle de Reembolsos</title>

    <meta
      name="description"
      content="Solicite e gerencie seus reembolsos de despesas corporativas de forma simples, com atualizações em tempo real." />
    <meta name="author" content="Victor Martins Dias" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://victormartinsd.github.io/refund-dashboard/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Refund - Controle de Reembolsos" />
    <meta
      property="og:description"
      content="Solicite e gerencie seus reembolsos de despesas corporativas de forma simples, com atualizações em tempo real." />
    <meta property="og:image" content="src/assets/img/preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Refund - Controle de Reembolsos" />
    <meta
      name="twitter:description"
      content="Solicite e gerencie seus reembolsos de despesas corporativas de forma simples, com atualizações em tempo real." />
    <meta name="twitter:image" content="src/assets/img/preview.png" />

    <link rel="icon" href="src/assets/img/favicon.png?v=2" type="image/png" />
    <link rel="shortcut icon" href="src/assets/img/favicon.png?v=2" type="image/png" />
    <link rel="apple-touch-icon" href="src/assets/img/favicon.png?v=2" />

    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main>
      <svg class="logo" role="img" aria-label="Convert logo">
        <use href="src/assets/img/icons.svg#icon-logo"></use>
      </svg>

      <section>
        <form>
          <h1>Solicitação de reembolso</h1>
          <p>
            Informe os dados da despesa para solicitar reembolso. A despesa será analisada e reembolsada em até 30 dias.
          </p>

          <fieldset>
            <legend>Nome da despesa</legend>
            <input
              type="text"
              id="expense"
              name="expense"
              maxlength="60"
              title="Digite o nome ou descrição da despesa (máximo 60 caracteres)"
              aria-label="Nome da despesa"
              oninvalid="this.setCustomValidity('Por favor, digite o nome da despesa.')"
              oninput="this.setCustomValidity('')"
              required />
          </fieldset>

          <div class="inputs-row">
            <fieldset>
              <legend>Categoria</legend>
              <select
                id="category"
                name="category"
                title="Selecione a categoria da despesa"
                aria-label="Categoria da despesa"
                oninvalid="this.setCustomValidity('Por favor, selecione uma categoria.')"
                oninput="this.setCustomValidity('')"
                required>
                <option value="" disabled selected hidden>Selecione</option>
                <option value="food">Alimentação</option>
                <option value="accommodation">Hospedagem</option>
                <option value="services">Serviços</option>
                <option value="transport">Transporte</option>
                <option value="others">Outros</option>
              </select>
            </fieldset>

            <fieldset>
              <legend>Valor da despesa</legend>
              <input
                type="text"
                name="amount"
                id="amount"
                placeholder="0,00"
                title="Digite o valor da despesa em reais (ex: 150,00)"
                aria-label="Valor da despesa em reais"
                oninvalid="this.setCustomValidity('Por favor, informe o valor da despesa.')"
                oninput="this.setCustomValidity('')"
                required />
            </fieldset>
          </div>

          <button type="submit">Adicionar despesa</button>
        </form>

        <aside>
          <header>
            <p>
              Minhas solicitações <i>&bullet;</i>
              <span>0 despesa</span>
            </p>
            <h2 aria-live="polite" aria-atomic="true"><small>R$</small>0,00</h2>
          </header>

          <ul aria-live="polite" aria-relevant="additions removals"></ul>
        </aside>
      </section>
    </main>
  </body>
</html>
